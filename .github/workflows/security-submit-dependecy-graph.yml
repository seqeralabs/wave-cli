name: Generate and submit dependency graph for wave-cli
on:
  push:
    branches: ['master']

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1 # v1.5.0
      with:
        java-version: 21

    - name: Generate and submit dependency graph for wave-cli
      uses: gradle/actions/dependency-submission@v4
      with:
        dependency-resolution-task: ":app:dependencies"
        additional-arguments: "--configuration runtimeClasspath"
        dependency-graph: generate-and-submit
